<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance Square Trending News</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .card { background: #1e1e1e; border-radius: 12px; padding: 20px; margin-bottom: 20px; border-left: 5px solid #f3ba2f; }
        h2 { color: #f3ba2f; margin-top: 0; }
        .article-img { width: 100%; border-radius: 8px; margin: 15px 0; display: block; }
        .timestamp { font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align: center; color: #f3ba2f;">Binance Square News Engine</h1>
        <div id="news-feed">Loading trending crypto updates...</div>
    </div>

    <script>
        async function loadNews() {
            try {
                // data.json hamara engine update karta rahega
                const response = await fetch('data.json');
                const articles = await response.json();
                const feed = document.getElementById('news-feed');
                feed.innerHTML = '';

                articles.forEach(art => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    // Humne images ko root par rakha hai, isliye path direct file ka naam hoga
                    card.innerHTML = `
                        <h2>${art.title}</h2>
                        ${art.content} 
                        <div class="timestamp">Updated every 12 hours</div>
                    `;
                    feed.appendChild(card);
                });
            } catch (e) {
                document.getElementById('news-feed').innerHTML = "Bhai, abhi engine start ho raha hai. Thodi der mein check karein!";
            }
        }
        loadNews();
    </script>
</body>
</html>
